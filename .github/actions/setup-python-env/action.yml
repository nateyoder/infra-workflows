name: Set up Python environment
description: >
  Shared prologue for the Python CI jobs: checkout, private editable-dep
  checkout, uv install (cached), Python install, authenticated lockfile check,
  and a frozen sync. Collapses the previously duplicated per-job setup into one
  definition.

inputs:
  python-version:
    description: "Python version to install via uv"
    required: false
    default: "3.12"
  editable-path-deps:
    description: >
      Newline-separated private editable path deps, forwarded to
      checkout-editable-deps. See that action for the line format.
    required: false
    default: ""
  repo-read-token:
    description: >
      PAT with read access to private dependency repos. Required when
      editable-path-deps is non-empty or the project has immutable private
      git+https://github.com dependencies.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
    - uses: nateyoder/infra-workflows/.github/actions/checkout-editable-deps@a326b975a3ea40c809ad1d9e46b2cab584445491 # infra-workflows#3
      with:
        editable-path-deps: ${{ inputs.editable-path-deps }}
        repo-read-token: ${{ inputs.repo-read-token }}
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: "0.11.28"
        enable-cache: true
        cache-dependency-glob: "**/uv.lock"
    - name: Set up Python
      shell: bash
      run: uv python install "${{ inputs.python-version }}"
    - name: Check lockfile and install dependencies
      shell: bash
      env:
        EDITABLE_PATH_DEPS: ${{ inputs.editable-path-deps }}
        REPO_READ_TOKEN: ${{ inputs.repo-read-token }}
      run: "$GITHUB_ACTION_PATH/install-dependencies.sh"
