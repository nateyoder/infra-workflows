name: Set up Python environment
description: >
  Shared prologue for the Python CI jobs: checkout, private editable-dep
  checkout, uv install (cached), Python install, lockfile check, and a frozen
  sync. Collapses the previously duplicated per-job setup into one definition.

inputs:
  python-version:
    description: "Python version to install via uv"
    required: false
    default: "3.12"
  editable-path-deps:
    description: >
      Newline-separated private editable path deps, forwarded to
      checkout-editable-deps. See that action for the line format.
    required: false
    default: ""
  repo-read-token:
    description: >
      PAT with read access to private dependency repos. Required when
      editable-path-deps is non-empty.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/checkout@v7
    - uses: nateyoder/infra-workflows/.github/actions/checkout-editable-deps@v1
      with:
        editable-path-deps: ${{ inputs.editable-path-deps }}
        repo-read-token: ${{ inputs.repo-read-token }}
    - name: Install uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true
        cache-dependency-glob: "**/uv.lock"
    - name: Set up Python
      shell: bash
      run: uv python install "${{ inputs.python-version }}"
    - name: Check lockfile consistency
      shell: bash
      run: uv lock --check
    - name: Install dependencies
      shell: bash
      run: uv sync --frozen
