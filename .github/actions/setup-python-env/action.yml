name: Set up Python environment
description: >
  Shared prologue for the Python CI jobs: checkout, private editable-dep
  checkout, uv install (cached), Python install, lockfile check, and a frozen
  sync. Collapses the previously duplicated per-job setup into one definition.

inputs:
  python-version:
    description: "Python version to install via uv"
    required: false
    default: "3.12"
  editable-path-deps:
    description: >
      Newline-separated private editable path deps, forwarded to
      checkout-editable-deps. See that action for the line format.
    required: false
    default: ""
  repo-read-token:
    description: >
      PAT with read access to private dependency repos. Required when
      editable-path-deps is non-empty.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/checkout@v7
    - uses: nateyoder/infra-workflows/.github/actions/checkout-editable-deps@v1
      with:
        editable-path-deps: ${{ inputs.editable-path-deps }}
        repo-read-token: ${{ inputs.repo-read-token }}
    - name: Install uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true
        cache-dependency-glob: "**/uv.lock"
    - name: Set up Python
      shell: bash
      run: uv python install "${{ inputs.python-version }}"
    - name: Check lockfile consistency
      shell: bash
      env:
        EDITABLE_PATH_DEPS: ${{ inputs.editable-path-deps }}
      run: |
        if uv lock --check; then
          exit 0
        fi
        echo "::error title=uv.lock is out of date::The committed uv.lock does not match what uv resolves here. Run 'uv lock' and commit the result."
        if [ -n "$EDITABLE_PATH_DEPS" ]; then
          echo "::notice title=editable path deps::This project has editable path dependencies. The lock may have been generated locally against a path-dep checkout that differs from the ref CI clones (its origin/main). Regenerate the lock against origin/main and commit it, or keep your local sibling checkouts in sync with origin/main."
        fi
        exit 1
    - name: Install dependencies
      shell: bash
      run: uv sync --frozen
