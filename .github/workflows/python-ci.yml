name: Python CI (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: "Version of Python to configure"
        required: false
        type: string
        default: "3.12"
      src-path:
        description: "Path to Python source directory"
        required: false
        type: string
        default: "src"
      tests-path:
        description: "Path to Python tests directory"
        required: false
        type: string
        default: "tests"
      cov-fail-under:
        description: "Minimum test coverage percentage required to pass"
        required: false
        type: number
        default: 90
      run-tests:
        description: "Whether to run pytest suite"
        required: false
        type: boolean
        default: true
      run-lint:
        description: "Whether to run ruff linter"
        required: false
        type: boolean
        default: true
      run-type-check:
        description: "Whether to run mypy type checker"
        required: false
        type: boolean
        default: true
      editable-path-deps:
        description: >
          Newline-separated list of private dependency repos to check out and
          symlink before running CI. Required when the project uses editable
          path dependencies that reference sibling repos not available to the
          default GITHUB_TOKEN.

          Format per line:
            <github_repo_full_name>:<checkout_path>:<symlink_path>

          - github_repo_full_name: e.g. nateyoder/perp-arb-ml
          - checkout_path: where to clone the repo, relative to GITHUB_WORKSPACE
          - symlink_path: the path uv expects, relative to GITHUB_WORKSPACE
                          (e.g. "../perp-arb-ml" becomes a sibling of workspace)

          Example:
            nateyoder/perp-arb-ml:.ci/deps/perp-arb-ml:../perp-arb-ml
            nateyoder/pmkt-clients:.ci/deps/pmkt_clients:../pmkt_clients
        required: false
        type: string
        default: ""
    secrets:
      repo-read-token:
        description: >
          Personal access token (PAT) with read access to private dependency
          repos. Required when editable-path-deps is non-empty. Do not use
          GITHUB_TOKEN — it cannot read sibling private repos.
        required: false

jobs:
  test:
    if: ${{ inputs.run-tests }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - name: Checkout private editable dependencies
        if: ${{ inputs.editable-path-deps != '' }}
        shell: bash
        env:
          REPO_READ_TOKEN: ${{ secrets.repo-read-token }}
          EDITABLE_PATH_DEPS: ${{ inputs.editable-path-deps }}
        run: |
          set -euo pipefail

          # Mask immediately so the token never appears in logs
          echo "::add-mask::$REPO_READ_TOKEN"

          if [ -z "$REPO_READ_TOKEN" ]; then
            echo "::error::repo-read-token secret is required when editable-path-deps is set"
            exit 1
          fi

          # Each non-empty line: <github_repo>:<checkout_path>:<symlink_path>
          #   checkout_path – relative to GITHUB_WORKSPACE, where the repo is cloned
          #   symlink_path  – relative to GITHUB_WORKSPACE, where uv expects the dep
          #                   (e.g. "../foo" resolves as a sibling of the workspace dir)
          while IFS= read -r line; do
            [ -z "$line" ] && continue

            repo="$(echo "$line" | cut -d: -f1)"
            checkout_path="$(echo "$line" | cut -d: -f2)"
            link_path="$(echo "$line" | cut -d: -f3)"

            if [ -z "$repo" ] || [ -z "$checkout_path" ] || [ -z "$link_path" ]; then
              echo "::error::Invalid editable-path-deps line (expected repo:checkout_path:symlink_path): '$line'"
              exit 1
            fi

            echo "Cloning $repo into $checkout_path"
            mkdir -p "$(dirname "$checkout_path")"
            # Clone via HTTPS with token — URL is constructed in env only, not echoed
            git clone --depth 1 \
              "https://x-access-token:${REPO_READ_TOKEN}@github.com/${repo}.git" \
              "$checkout_path"

            absolute_checkout="${GITHUB_WORKSPACE}/${checkout_path}"
            absolute_link="${GITHUB_WORKSPACE}/${link_path}"
            mkdir -p "$(dirname "$absolute_link")"

            if [ -e "$absolute_link" ] || [ -L "$absolute_link" ]; then
              existing="$(readlink "$absolute_link" || true)"
              if [ "$existing" != "$absolute_checkout" ]; then
                echo "::error::Path already exists and is not the expected symlink: $absolute_link -> $existing (expected -> $absolute_checkout)"
                exit 1
              fi
              echo "Symlink already correct: $absolute_link -> $absolute_checkout"
            else
              ln -s "$absolute_checkout" "$absolute_link"
              echo "Symlinked: $absolute_link -> $absolute_checkout"
            fi
          done <<< "$EDITABLE_PATH_DEPS"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Set up Python
        run: uv python install ${{ inputs.python-version }}
      - name: Check lockfile consistency
        run: uv lock --check
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          if [ -d "${{ inputs.tests-path }}" ]; then
            PYTHONPATH=${{ inputs.src-path }} uv run pytest ${{ inputs.tests-path }} \
              --cov=${{ inputs.src-path }} \
              --cov-report=term-missing \
              --cov-fail-under=${{ inputs.cov-fail-under }} \
              -v --tb=short 2>&1 | tee pytest-output.txt
          else
            echo "Tests directory '${{ inputs.tests-path }}' not found. Skipping tests."
            echo "No tests found." > pytest-output.txt
          fi
      - name: Coverage summary
        if: always()
        run: |
          echo '## Test Coverage' >> $GITHUB_STEP_SUMMARY
          grep -E "^(TOTAL|Name.*Stmts|-----|Required|=====)" pytest-output.txt | tail -20 >> $GITHUB_STEP_SUMMARY || true
      - name: Coverage PR comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: MishaKav/pytest-coverage-comment@v1
        with:
          pytest-coverage-path: ./pytest-output.txt
          title: Test Coverage

  lint:
    if: ${{ inputs.run-lint }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Checkout private editable dependencies
        if: ${{ inputs.editable-path-deps != '' }}
        shell: bash
        env:
          REPO_READ_TOKEN: ${{ secrets.repo-read-token }}
          EDITABLE_PATH_DEPS: ${{ inputs.editable-path-deps }}
        run: |
          set -euo pipefail

          echo "::add-mask::$REPO_READ_TOKEN"

          if [ -z "$REPO_READ_TOKEN" ]; then
            echo "::error::repo-read-token secret is required when editable-path-deps is set"
            exit 1
          fi

          # Each non-empty line: <github_repo>:<checkout_path>:<symlink_path>
          #   checkout_path – relative to GITHUB_WORKSPACE, where the repo is cloned
          #   symlink_path  – relative to GITHUB_WORKSPACE, where uv expects the dep
          #                   (e.g. "../foo" resolves as a sibling of the workspace dir)
          while IFS= read -r line; do
            [ -z "$line" ] && continue

            repo="$(echo "$line" | cut -d: -f1)"
            checkout_path="$(echo "$line" | cut -d: -f2)"
            link_path="$(echo "$line" | cut -d: -f3)"

            if [ -z "$repo" ] || [ -z "$checkout_path" ] || [ -z "$link_path" ]; then
              echo "::error::Invalid editable-path-deps line (expected repo:checkout_path:symlink_path): '$line'"
              exit 1
            fi

            echo "Cloning $repo into $checkout_path"
            mkdir -p "$(dirname "$checkout_path")"
            git clone --depth 1 \
              "https://x-access-token:${REPO_READ_TOKEN}@github.com/${repo}.git" \
              "$checkout_path"

            absolute_checkout="${GITHUB_WORKSPACE}/${checkout_path}"
            absolute_link="${GITHUB_WORKSPACE}/${link_path}"
            mkdir -p "$(dirname "$absolute_link")"

            if [ -e "$absolute_link" ] || [ -L "$absolute_link" ]; then
              existing="$(readlink "$absolute_link" || true)"
              if [ "$existing" != "$absolute_checkout" ]; then
                echo "::error::Path already exists and is not the expected symlink: $absolute_link -> $existing (expected -> $absolute_checkout)"
                exit 1
              fi
              echo "Symlink already correct: $absolute_link -> $absolute_checkout"
            else
              ln -s "$absolute_checkout" "$absolute_link"
              echo "Symlinked: $absolute_link -> $absolute_checkout"
            fi
          done <<< "$EDITABLE_PATH_DEPS"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Run linter and formatter
        shell: bash
        run: |
          src_real=$(realpath "${{ inputs.src-path }}" 2>/dev/null || true)
          tests_real=$(realpath "${{ inputs.tests-path }}" 2>/dev/null || true)

          PATHS=""
          if [ -d "${{ inputs.src-path }}" ]; then
            PATHS="$PATHS ${{ inputs.src-path }}"
          fi
          # Only add tests-path if it is not already contained within src-path
          if [ -d "${{ inputs.tests-path }}" ] && [[ "$tests_real" != "$src_real"/* && "$tests_real" != "$src_real" ]]; then
            PATHS="$PATHS ${{ inputs.tests-path }}"
          fi

          if [ -n "$PATHS" ]; then
            uv run ruff check $PATHS
            uv run ruff format --check $PATHS
          else
            echo "No source or test directories found to lint."
          fi

  type-check:
    if: ${{ inputs.run-type-check }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Checkout private editable dependencies
        if: ${{ inputs.editable-path-deps != '' }}
        shell: bash
        env:
          REPO_READ_TOKEN: ${{ secrets.repo-read-token }}
          EDITABLE_PATH_DEPS: ${{ inputs.editable-path-deps }}
        run: |
          set -euo pipefail

          echo "::add-mask::$REPO_READ_TOKEN"

          if [ -z "$REPO_READ_TOKEN" ]; then
            echo "::error::repo-read-token secret is required when editable-path-deps is set"
            exit 1
          fi

          # Each non-empty line: <github_repo>:<checkout_path>:<symlink_path>
          #   checkout_path – relative to GITHUB_WORKSPACE, where the repo is cloned
          #   symlink_path  – relative to GITHUB_WORKSPACE, where uv expects the dep
          #                   (e.g. "../foo" resolves as a sibling of the workspace dir)
          while IFS= read -r line; do
            [ -z "$line" ] && continue

            repo="$(echo "$line" | cut -d: -f1)"
            checkout_path="$(echo "$line" | cut -d: -f2)"
            link_path="$(echo "$line" | cut -d: -f3)"

            if [ -z "$repo" ] || [ -z "$checkout_path" ] || [ -z "$link_path" ]; then
              echo "::error::Invalid editable-path-deps line (expected repo:checkout_path:symlink_path): '$line'"
              exit 1
            fi

            echo "Cloning $repo into $checkout_path"
            mkdir -p "$(dirname "$checkout_path")"
            git clone --depth 1 \
              "https://x-access-token:${REPO_READ_TOKEN}@github.com/${repo}.git" \
              "$checkout_path"

            absolute_checkout="${GITHUB_WORKSPACE}/${checkout_path}"
            absolute_link="${GITHUB_WORKSPACE}/${link_path}"
            mkdir -p "$(dirname "$absolute_link")"

            if [ -e "$absolute_link" ] || [ -L "$absolute_link" ]; then
              existing="$(readlink "$absolute_link" || true)"
              if [ "$existing" != "$absolute_checkout" ]; then
                echo "::error::Path already exists and is not the expected symlink: $absolute_link -> $existing (expected -> $absolute_checkout)"
                exit 1
              fi
              echo "Symlink already correct: $absolute_link -> $absolute_checkout"
            else
              ln -s "$absolute_checkout" "$absolute_link"
              echo "Symlinked: $absolute_link -> $absolute_checkout"
            fi
          done <<< "$EDITABLE_PATH_DEPS"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Set up Python
        run: uv python install ${{ inputs.python-version }}
      - name: Check lockfile consistency
        run: uv lock --check
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run type checker
        shell: bash
        run: |
          src_real=$(realpath "${{ inputs.src-path }}" 2>/dev/null || true)
          tests_real=$(realpath "${{ inputs.tests-path }}" 2>/dev/null || true)

          PATHS=""
          if [ -d "${{ inputs.src-path }}" ]; then
            PATHS="$PATHS ${{ inputs.src-path }}"
          fi
          # Only add tests-path if it is not already contained within src-path
          if [ -d "${{ inputs.tests-path }}" ] && [[ "$tests_real" != "$src_real"/* && "$tests_real" != "$src_real" ]]; then
            PATHS="$PATHS ${{ inputs.tests-path }}"
          fi

          if [ -n "$PATHS" ]; then
            uv run mypy $PATHS
          else
            echo "No source or test directories found for type checking."
          fi