name: Python CI (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: "Version of Python to configure"
        required: false
        type: string
        default: "3.12"
      src-path:
        description: "Path to Python source directory"
        required: false
        type: string
        default: "src"
      tests-path:
        description: "Path to Python tests directory"
        required: false
        type: string
        default: "tests"
      cov-fail-under:
        description: "Minimum test coverage percentage required to pass"
        required: false
        type: number
        default: 90
      coverage:
        description: "Whether tests enforce and report coverage"
        required: false
        type: boolean
        default: true
      test-workers:
        description: "Number of pytest-xdist workers; 0 keeps serial pytest"
        required: false
        type: number
        default: 0
      pytest-args:
        description: >
          Space-separated extra pytest arguments. Values containing whitespace
          are not supported.
        required: false
        type: string
        default: ""
      test-timeout-minutes:
        description: "Maximum minutes for the consolidated quality gate"
        required: false
        type: number
        default: 15
      run-tests:
        description: "Whether to run pytest suite"
        required: false
        type: boolean
        default: true
      run-lint:
        description: "Whether to run ruff linter"
        required: false
        type: boolean
        default: true
      run-type-check:
        description: "Whether to run mypy type checker"
        required: false
        type: boolean
        default: true
      run-integration-tests:
        description: >
          Whether to run the opt-in integration test suite (selected by
          integration-marker). Runs on a runner with Docker available, so
          tests using testcontainers or service containers work. Off by default.
        required: false
        type: boolean
        default: false
      integration-marker:
        description: >
          pytest -m marker expression selecting the integration suite. Passed on
          the command line, so it overrides any default deselection in the
          project's pyproject addopts (e.g. -m "not integration").
        required: false
        type: string
        default: "integration"
      editable-path-deps:
        description: >
          Newline-separated list of private dependency repos to check out and
          symlink before running CI. Required when the project uses editable
          path dependencies that reference sibling repos not available to the
          default GITHUB_TOKEN.

          Format per line:
            <github_repo_full_name>:<checkout_path>:<symlink_path>

          - github_repo_full_name: e.g. nateyoder/perp-arb-ml
          - checkout_path: where to clone the repo, relative to GITHUB_WORKSPACE
          - symlink_path: the path uv expects, relative to GITHUB_WORKSPACE
                          (e.g. "../perp-arb-ml" becomes a sibling of workspace)

          Example:
            nateyoder/perp-arb-ml:.ci/deps/perp-arb-ml:../perp-arb-ml
            nateyoder/pmkt-clients:.ci/deps/pmkt_clients:../pmkt_clients
        required: false
        type: string
        default: ""
    secrets:
      repo-read-token:
        description: >
          Personal access token (PAT) with read access to private dependency
          repos. Required when editable-path-deps is non-empty. Do not use
          GITHUB_TOKEN — it cannot read sibling private repos.
        required: false

jobs:
  test:
    if: ${{ inputs.run-tests || inputs.run-lint || inputs.run-type-check }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.test-timeout-minutes }}
    permissions:
      contents: read
    steps:
      - uses: nateyoder/infra-workflows/.github/actions/setup-python-env@789efce74cd52d896c6ab4c64214b737283c29d9 # pinned runtime
        with:
          python-version: ${{ inputs.python-version }}
          editable-path-deps: ${{ inputs.editable-path-deps }}
          repo-read-token: ${{ secrets.repo-read-token }}
      - name: Run linter and formatter
        if: ${{ inputs.run-lint }}
        shell: bash
        run: |
          src_real=$(realpath "${{ inputs.src-path }}" 2>/dev/null || true)
          tests_real=$(realpath "${{ inputs.tests-path }}" 2>/dev/null || true)
          paths=()
          if [ -d "${{ inputs.src-path }}" ]; then
            paths+=("${{ inputs.src-path }}")
          fi
          if [ -d "${{ inputs.tests-path }}" ] && { [ -z "$src_real" ] || [[ "$tests_real" != "$src_real"/* && "$tests_real" != "$src_real" ]]; }; then
            paths+=("${{ inputs.tests-path }}")
          fi
          if [ "${#paths[@]}" -gt 0 ]; then
            uv run ruff check "${paths[@]}"
            uv run ruff format --check "${paths[@]}"
          else
            echo "No source or test directories found to lint."
          fi
      - name: Run type checker
        if: ${{ inputs.run-type-check }}
        shell: bash
        run: |
          src_real=$(realpath "${{ inputs.src-path }}" 2>/dev/null || true)
          tests_real=$(realpath "${{ inputs.tests-path }}" 2>/dev/null || true)
          paths=()
          if [ -d "${{ inputs.src-path }}" ]; then
            paths+=("${{ inputs.src-path }}")
          fi
          if [ -d "${{ inputs.tests-path }}" ] && { [ -z "$src_real" ] || [[ "$tests_real" != "$src_real"/* && "$tests_real" != "$src_real" ]]; }; then
            paths+=("${{ inputs.tests-path }}")
          fi
          if [ "${#paths[@]}" -gt 0 ]; then
            uv run mypy "${paths[@]}"
          else
            echo "No source or test directories found for type checking."
          fi
      - name: Run tests
        if: ${{ inputs.run-tests }}
        shell: bash
        env:
          PYTEST_ARGS: ${{ inputs.pytest-args }}
        run: |
          set -o pipefail
          if [ -d "${{ inputs.tests-path }}" ]; then
            args=("${{ inputs.tests-path }}" -v --tb=short)
            if [ "${{ inputs.coverage }}" = "true" ]; then
              args+=(
                "--cov=${{ inputs.src-path }}"
                --cov-report=term-missing
                "--cov-fail-under=${{ inputs.cov-fail-under }}"
              )
            fi
            if [ "${{ inputs.test-workers }}" -gt 0 ]; then
              args+=(-n "${{ inputs.test-workers }}" --dist=worksteal)
            fi
            if [ -n "$PYTEST_ARGS" ]; then
              read -r -a extra_args <<< "$PYTEST_ARGS"
              args+=("${extra_args[@]}")
            fi
            if [ "${{ inputs.coverage }}" != "true" ]; then
              args+=(--no-cov)
            fi
            PYTHONPATH=${{ inputs.src-path }} uv run pytest "${args[@]}" 2>&1 | tee pytest-output.txt
          else
            echo "Tests directory '${{ inputs.tests-path }}' not found. Skipping tests."
            echo "No tests found." > pytest-output.txt
          fi
      - name: Coverage summary
        if: ${{ always() && inputs.run-tests && inputs.coverage }}
        run: |
          echo '## Test Coverage' >> $GITHUB_STEP_SUMMARY
          grep -E "^(TOTAL|Name.*Stmts|-----|Required|=====)" pytest-output.txt | tail -20 >> $GITHUB_STEP_SUMMARY || true

  integration-test:
    if: ${{ inputs.run-integration-tests }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: nateyoder/infra-workflows/.github/actions/setup-python-env@789efce74cd52d896c6ab4c64214b737283c29d9 # pinned runtime
        with:
          python-version: ${{ inputs.python-version }}
          editable-path-deps: ${{ inputs.editable-path-deps }}
          repo-read-token: ${{ secrets.repo-read-token }}
      - name: Run integration tests
        shell: bash
        env:
          SRC_PATH: ${{ inputs.src-path }}
          TESTS_PATH: ${{ inputs.tests-path }}
          INTEGRATION_MARKER: ${{ inputs.integration-marker }}
        run: |
          if [ ! -d "$TESTS_PATH" ]; then
            echo "Tests directory '$TESTS_PATH' not found. Skipping."
            exit 0
          fi
          set +e
          PYTHONPATH="$SRC_PATH" uv run pytest "$TESTS_PATH" \
            -m "$INTEGRATION_MARKER" \
            -v --tb=short
          status=$?
          set -e
          # pytest exit code 5 = no tests collected (marker matched nothing) → OK.
          if [ "$status" -eq 5 ]; then
            echo "No tests matched marker '$INTEGRATION_MARKER'."
            exit 0
          fi
          exit "$status"
